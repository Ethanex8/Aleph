name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tools:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        
    - name: Run linter and formatter (Ruff)
      run: |
        ruff check .
        ruff format --check .

    - name: Run type checker (mypy)
      run: mypy tools/

    - name: Run tests with coverage
      run: |
        python -m pytest -v --cov=tools --cov-report=term-missing --cov-report=xml
        
    - name: Verify book
      run: |
        python -m tools verify

