repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: [lark, pyyaml, types-PyYAML]
        args: [--ignore-missing-imports]
        files: ^tools/
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest
        language: system
        pass_filenames: false
        always_run: true
      - id: verify
        name: verify
        entry: python -m tools verify
        language: system
        pass_filenames: false
        always_run: true
